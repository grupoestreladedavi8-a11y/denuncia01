<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login Admin</title>

<style>
body {
    font-family: Arial;
    background: #f4f7fb;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: white;
    padding: 25px;
    border-radius: 10px;
    width: 300px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 15px;
    background: #1f4e79;
    color: white;
    border: none;
}
</style>
</head>

<body>

<div class="box">
    <h3>Login Admin</h3>

    <input id="user" placeholder="Usuário">
    <input id="pass" type="password" placeholder="Senha">

    <button onclick="login()">Entrar</button>
</div>

<script>

async function login(){

    const res = await fetch("/api/login", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            user: document.getElementById("user").value,
            pass: document.getElementById("pass").value
        })
    });

    if(res.ok){
        window.location.href = "/admin.html";
    } else {
        alert("Login inválido");
    }
}

</script>

</body>
</html>
